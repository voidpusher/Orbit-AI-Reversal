# Render blueprint for the Orbit backend (FastAPI API + Postgres).
# In Render: New → Blueprint → connect this repo. It provisions everything below.
# The Next.js frontend deploys separately on Vercel (see DEPLOYMENT.md).

databases:
  - name: orbit-db
    plan: free

services:
  - type: web
    name: orbit-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -e ".[postgres,observability]"
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /healthz
    envVars:
      - key: ORBIT_DATABASE_URL
        fromDatabase:
          name: orbit-db
          property: connectionString
      - key: ORBIT_RUN_MIGRATIONS_ON_STARTUP
        value: "true"
      - key: ORBIT_ENVIRONMENT
        value: production
      # Set to your Vercel URL so CORS allows the frontend (e.g. https://orbit.vercel.app)
      - key: ORBIT_FRONTEND_BASE_URL
        sync: false
      # This service's own public URL (used only if you re-enable OAuth).
      - key: ORBIT_PUBLIC_BASE_URL
        sync: false
      # Auth ships DISABLED by default — the public site needs no login. To turn
      # the full auth/OAuth/RBAC system back on, set ORBIT_AUTH_DISABLED=false here
      # and NEXT_PUBLIC_AUTH_DISABLED=false on Vercel.
      # Optional integrations — set in the Render dashboard if you have them:
      # ORBIT_OPENAI_API_KEY, ORBIT_SENTRY_DSN
