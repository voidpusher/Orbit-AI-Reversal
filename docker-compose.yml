services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: orbit
      POSTGRES_USER: orbit
      POSTGRES_PASSWORD: orbit
    ports: ["5432:5432"]
    volumes: ["orbit_postgres:/var/lib/postgresql/data"]
  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
volumes:
  orbit_postgres:
